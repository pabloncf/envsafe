target-version = "py311"
line-length = 100

[lint]
select = ["E", "W", "F", "I", "UP", "S"]
ignore = [
    "S101",  # assert statements allowed in tests
    "S603",  # subprocess calls — not used in this project
    "S607",  # subprocess calls — not used in this project
]

[lint.per-file-ignores]
"tests/**" = ["S", "E501"]

[format]
quote-style = "double"
indent-style = "space"
